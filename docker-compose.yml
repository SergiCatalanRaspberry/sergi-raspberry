version: '3.8'

services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: 1000:1000
    network_mode: "host"
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      - /home/sergi/media:/data:ro
    restart: unless-stopped

  samba:
    image: dperson/samba
    container_name: samba
    ports:
      - "139:139"
      - "445:445"
    volumes:
      - /home/sergi/media:/mnt/media
    command: -u "sergi;asix2-2526" -s "Media;/mnt/media;no;no;no;sergi"
    restart: unless-stopped

  web-server:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/html:/usr/share/nginx/html
    restart: unless-stopped
